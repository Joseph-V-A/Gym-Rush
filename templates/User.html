                        <div class="card-body" style="margin-bottom: 0;">
                            <form class="text-center" id="registrationForm">
                                <div class="mb-3">
                                    <input class="form-control" type="text" name="name" id="name" placeholder="Name" required>
                               </div>

                                    <input class="form-control" type="email" name="email" id="gmail" placeholder="Email" required>
                                </div>
                                <div class="mb-3">
                                    <input class="form-control" type="number" name="age" id="age" placeholder="Age" min="10" max="100" required>
                                </div>
                                <div class="mb-3">
                                    <select class="form-control" name="gender" id="gender" required>
                                        <option value="" disabled selected>Select Gender</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <input class="form-control" type="Password" id="pass" placeholder="Password" required>
                                    <p id="nameError" class="text-danger"></p>
                                </div>
                                <div class="mb-3">
                                    <input class="form-control" type="text" id="pass2" placeholder="ReEnter Password" required>
                                </div>
                                <div class="btn">
                                <div class="mb-3">
                                    <button class="btn btn-warning d-block w-100" type="submit" id="button1">REGISTER</button>
                                </div>
                               
                            </div>
                            </form>
                        </div>

    <script src="{% static 'js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>

    <script>

document.getElementById("registrationForm").addEventListener("submit",function(){
    event.preventDefault(); // Prevents the default form submission behavior

    document.getElementById('nameError').textContent = '';

name=document.getElementById("name").value;
age=document.getElementById("age").value;
gender=document.getElementById("gender").value;
pass=document.getElementById("pass").value;
pass2=document.getElementById("pass2").value;
gmail=document.getElementById("gmail").value;
var password=pass

var nameRegex = /^[a-zA-Z\s'-]+$/;



if (!name.match(nameRegex)) {
   alert("Enter a valid name")
    } 
    else if (pass.length < 8 || !/[A-Z]/.test(pass) || !/[a-z]/.test(pass) || !/[0-9]/.test(pass) || !/[!@#$%^&*()_+{}\[\]:;<>,.?~\\-]/.test(pass)) {
        document.getElementById('nameError').textContent = 'Password is weak. It should contain at least 8 characters, including uppercase, lowercase, numbers, and special characters.';
                        document.getElementById('nameError').style.color = 'red';
    }
else if(pass!=pass2)
{
    document.getElementById('nameError').textContent = 'Password Mismatch';
    document.getElementById('nameError').style.color = 'red';
}
else
{
console.log(name,age,gender,pass,pass2,gmail)

    $.ajax({
    url:"/userreg",
    method:"POST",
    data:{
        "name":name,
        "age":age,
        "gender":gender,
        "pass":pass,
        "gmail":gmail
    },
    success:function(da){
                        alert(da.msg)
                        if(da.msg=="Successfully Registread")
                        {
                        var url = "{% url 'Guest:otp' %}"
                           window.location.href = url;
                        }
                        }
})



}
})




    
  

    </script>
