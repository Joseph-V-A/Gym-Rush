<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: rgb(0, 0, 0, 0.1);
        }
        .main {
            height: 70vh;
            background-color: whitesmoke;
            width: 80vh;
            margin-left: 50vh;
            margin-top: 10vh;
            border-radius: 5px;
        }
        .Payment {
            margin-left: 18vh;
        }
        .input {
            margin-left: 8vh;
            margin-top: 8vh;
        }
        .input input {
            width: 60vh;
        }
        .pay {
            margin-top: 5vh;
            margin-left: 8vh;
        }
        .pay1 {
            width: 62vh;
            background-color: #1a53ff;
        }
    </style>
</head>
<body>
    <br>
    <br>
    <div class="main">
        <div class="Payment">
            <h1>Payment Gateway</h1>
        </div>
        <form action="{% url 'User:Gyms' %}" method="post">
            <div class="input">
                <p>Card Number</p>
                <input type="number" placeholder="Enter the card details" required>
                <p>CardHolder Name</p>
                <input type="text" placeholder="Enter the Cardholder Name" required>
                <p>Expiration Date</p>
                <input type="month" required>
                <p>CVV</p>
                <input type="number" placeholder="Enter CVV" required>
            </div>
            <div class="pay">
                <input type="submit" id="pay" class="pay1" value="PAY">
            </div>
        </form>
    </div>
    <br>
    <br>
</body>
</html>
