<script>

document.getElementById("registrationForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Prevents the default form submission behavior

    document.getElementById('nameError').textContent = '';

    var name = document.getElementById("name").value;
    var pass = document.getElementById("pass").value;
    var pass2 = document.getElementById("pass2").value;
    var gmail = document.getElementById("email").value;
    var address = document.getElementById("address").value;

    var nameRegex = /^[a-zA-Z\s'-]+$/;

    if (!name.match(nameRegex)) {
        alert("Enter a valid name");
    } else if (pass.length < 8 || !/[A-Z]/.test(pass) || !/[a-z]/.test(pass) || !/[0-9]/.test(pass) || !/[!@#$%^&*()_+{}\[\]:;<>,.?~\\-]/.test(pass)) {
        document.getElementById('nameError').textContent = 'Password is weak. It should contain at least 8 characters, including uppercase, lowercase, numbers, and special characters.';
        document.getElementById('nameError').style.color = 'red';
    } else if (pass != pass2) {
        document.getElementById('nameError').textContent = 'Password Mismatch';
        document.getElementById('nameError').style.color = 'red';
    } else {
     
        var myObject = { "name": name,
                        "pass":pass,
                        "gmail":gmail,
                        "address":address
    };
localStorage.setItem('gymdata',JSON.stringify(myObject));

var url = "{% url 'Guest:gymreg2' %}"

// Redirect to the Django URL
window.location.href = url;

    }
});
var storedObject = JSON.parse(localStorage.getItem('gymdata'));
if(storedObject!="")
{

    var storedObject = JSON.parse(localStorage.getItem('gymdata'));
    document.getElementById("name").value=storedObject["name"]
   document.getElementById("pass").value=storedObject["pass"]
    document.getElementById("pass2").value=storedObject["pass"]
    document.getElementById("email").value=storedObject["gmail"]
     document.getElementById("address").value=storedObject["address"]
}

</script>
